<body>
    <form action="" style="border: 1px solid black; padding: 4%; width: fit-content;">
        <h3>Welcome to Form</h3>
        <div>
            <label for="name">Name: </label>
            <input type="text" name="name" id="name" placeholder="enter your name">
        </div> <br>
        <div>
            <label for="email">Email: </label>
            <input type="email" name="email" id="email" placeholder="enter your email">
        </div> <br>
        <div>
            <label for="message">Message: </label> <br>
            <textarea name="message" id="message" placeholder="enter your message" rows="5" cols="50"></textarea>
        </div> <br>
        <div>
            <label for="dob">Date of birth: </label>
            <input type="date" name="dob" id="dob">
        </div> <br>
        <div>
            <label for="department">Department: </label>
            <select name="department" id="department">
                <option value="cse">cse</option>
                <option value="ece">ece</option>
            </select>
        </div> <br>
        <div>
            <label for="gender">Gender: </label>
            <input type="radio" name="gender" value="male" id="gender-male">
            <label for="gender-male">Male</label>
            <input type="radio" name="gender" value="female" id="gender-female">
            <label for="gender-female">Female</label>
        </div> <br>
        <div>
            <span>Rating: </span> <br>
            <label for="good-rating">Good</label>
            <input type="checkbox" name="good-rating" id="good-rating">
            <label for="bad-rating">Bad</label>
            <input type="checkbox" name="bad-rating" id="bad-rating">
        </div> <br>
        <div>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>
    </form>
</body>
